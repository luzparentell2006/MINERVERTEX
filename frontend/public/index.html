<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MINERVERTEX - Plataforma de inversión en criptomonedas. Invierte 50 USDT y gana en 31 días.">
  <meta name="theme-color" content="#667eea">
  <title>MINERVERTEX - Plataforma de Inversión en Criptomonedas</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%23667eea' font-weight='bold'>⛏</text></svg>">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .loading-container {
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    .spinner {
      margin: 30px 0;
    }

    .spinner-border {
      display: inline-block;
      width: 40px;
      height: 40px;
      vertical-align: text-bottom;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-right-color: white;
      border-radius: 50%;
      animation: spinner-rotate 0.6s linear infinite;
    }

    @keyframes spinner-rotate {
      100% { transform: rotate(360deg); }
    }

    .features {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .feature {
      background: rgba(255, 255, 255, 0.1);
      padding: 15px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .feature-text {
      font-size: 0.9rem;
    }

    noscript {
      display: block;
      background: #ef4444;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      margin: 20px;
    }
  </style>
</head>
<body>
  <div id="root" class="loading-container">
    <div class="logo">⛏️</div>
    <h1>MINERVERTEX</h1>
    <p class="subtitle">Plataforma de Inversión en Criptomonedas</p>
    
    <div class="spinner">
      <div class="spinner-border"></div>
    </div>
    
    <p>Cargando plataforma...</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">💰</div>
        <div class="feature-text">Inversión 50 USDT</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📈</div>
        <div class="feature-text">31 Días</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⛏️</div>
        <div class="feature-text">Minería Diaria</div>
      </div>
      <div class="feature">
        <div class="feature-icon">👥</div>
        <div class="feature-text">Referidos 5%</div>
      </div>
    </div>
  </div>

  <noscript>
    <strong>⚠️ JavaScript está deshabilitado</strong><br>
    Esta aplicación requiere JavaScript para funcionar correctamente.<br>
    Por favor, habilita JavaScript en tu navegador.
  </noscript>

  <!-- React App -->
  <script src="../src/index.js" type="module"></script>
</body>
</html>
